name: quantum_ide
description: "QuantumIDE - A next-generation AI-powered mobile IDE for web development built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  re_editor: ^0.8.0
  re_highlight: ^0.0.3
  path_provider: ^2.1.3
  file_picker: ^11.0.2
  permission_handler: ^11.3.1
  flutter_lucide: ^1.0.0
  flex_color_scheme: ^8.4.0
  flutter_inappwebview: ^6.1.5
  google_generative_ai: ^0.4.0
  xterm: ^4.0.0
  flutter_pty: ^0.4.2
  google_fonts: ^6.0.0
  shared_preferences: ^2.2.0
  intl: ^0.20.2
  logger: ^2.0.0
  path: ^1.9.1
  uuid: ^4.3.3
  dio: ^5.4.0
  archive: ^3.6.1
  flterm: ^0.0.2
  sliding_up_panel2: ^3.3.0+1
  url_launcher: ^6.3.2
  open_filex: ^4.5.0
  diff_match_patch: ^0.4.1
  lsp_client: ^0.1.2
  file_icon: ^1.0.0
  desktop_drop: ^0.7.1
  flutter_markdown: ^0.7.7+1
  photo_view: ^0.15.0
  fl_chart: ^0.69.0
  lottie: ^3.1.2
  # Performance and error handling
  device_info_plus: ^9.0.0  # Device information for cross-platform detection
  package_info_plus: ^9.0.1  # Compatible with web constraints

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/init-host.sh
